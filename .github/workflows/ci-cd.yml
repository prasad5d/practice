name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: devops-task-app

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest
      - name: Run tests
        run: pytest app/tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}
          ENVIRONMENT: test

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set image version tag
        run: echo "VERSION=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$VERSION -t $IMAGE_NAME:latest .
      - name: Smoke test the container
        run: |
          docker run -d --name smoke-test -p 5000:5000 $IMAGE_NAME:latest
          sleep 5
          curl --fail http://localhost:5000/health
          docker stop smoke-test

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set version
        run: echo "VERSION=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
      - name: Simulate deployment
        run: |
          echo "Deploying image $IMAGE_NAME:$VERSION to production..."
          echo "Deploy complete!"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    steps:
      - name: Set version
        run: echo "VERSION=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
      - name: Print success message
        run: echo "Deployment successful! Version $VERSION"
